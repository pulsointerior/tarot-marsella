<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Copas">
  <!-- Copa: boca superior -->
  <path d="M5 3 L19 3"/>
  <!-- Lados curvados de la copa hacia el tallo -->
  <path d="M5 3 Q4 8 7 11 Q9.5 13.5 12 14 Q14.5 13.5 17 11 Q20 8 19 3"/>
  <!-- Tallo -->
  <line x1="12" y1="14" x2="12" y2="19"/>
  <!-- Base -->
  <path d="M8 19 Q8 21 12 21 Q16 21 16 19"/>
  <line x1="8" y1="19" x2="16" y2="19"/>
  <!-- Detalle ornamental: gota o menisco en el interior -->
  <path d="M9.5 7 Q12 10.5 14.5 7" stroke-width="1" opacity="0.6"/>
</svg>
