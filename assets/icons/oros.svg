<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="Oros">
  <!-- Círculo exterior — moneda -->
  <circle cx="12" cy="12" r="9"/>
  <!-- Círculo interior decorativo — anillo -->
  <circle cx="12" cy="12" r="6" stroke-width="1"/>
  <!-- Estrella de 8 puntas inscrita — símbolo de abundancia -->
  <circle cx="12" cy="12" r="3" stroke-width="1" opacity="0.7"/>
  <!-- Cruz diagonal ornamental -->
  <line x1="12" y1="6" x2="12" y2="9" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="15" x2="12" y2="18" stroke-width="1" opacity="0.5"/>
  <line x1="6" y1="12" x2="9" y2="12" stroke-width="1" opacity="0.5"/>
  <line x1="15" y1="12" x2="18" y2="12" stroke-width="1" opacity="0.5"/>
  <!-- Puntos cardinales diagonales -->
  <line x1="7.93" y1="7.93" x2="9.88" y2="9.88" stroke-width="1" opacity="0.4"/>
  <line x1="14.12" y1="14.12" x2="16.07" y2="16.07" stroke-width="1" opacity="0.4"/>
  <line x1="16.07" y1="7.93" x2="14.12" y2="9.88" stroke-width="1" opacity="0.4"/>
  <line x1="9.88" y1="14.12" x2="7.93" y2="16.07" stroke-width="1" opacity="0.4"/>
</svg>
