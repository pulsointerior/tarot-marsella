  <style>
    .index-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-4);
      gap: var(--space-4);

    .index-titulo {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 6vw, 4rem);

    .index-btn-entrar {

      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--bg-dark);
      background: var(--secondary);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      text-decoration: none;
    }
    .index-btn-entrar:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }
    .index-ornamento {
      font-family: 'Cinzel', serif;
